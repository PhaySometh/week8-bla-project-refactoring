name: w8_bla_project_refactoring
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: GT-Eesti
      fonts:
        - asset: assets/fonts/GT-Eesti-Regular.otf
        - asset: assets/fonts/GT-Eesti-Bold.otf
          weight: 700
        - asset: assets/fonts/GT-Eesti-Light.otf
          weight: 300
        - asset: assets/fonts/GT-Eesti-Thin.otf
          weight: 100
